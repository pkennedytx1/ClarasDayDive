<!-- @dsCard group="Colors" viewport="700x180" name="Supporting Tints" subtitle="Drink pink, butter sun, antique gold — pulled from the illustrations" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--clr-cream); padding: 22px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .chip { height: 86px; }
  .meta { background: var(--clr-white); padding: 8px 11px; }
  .name { font-size: 13px; font-weight: 600; color: var(--clr-ink); }
  .hex { font-size: 12px; color: var(--clr-ink-60); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--clr-pink)"></div><div class="meta"><div class="name">Drink Pink</div><div class="hex">#E0A6AC</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--clr-pink-soft)"></div><div class="meta"><div class="name">Pink · wash</div><div class="hex">#EFCDD0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--clr-butter)"></div><div class="meta"><div class="name">Butter Sun</div><div class="hex">#EBE2A6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--clr-gold)"></div><div class="meta"><div class="name">Antique Gold</div><div class="hex">#B08D3F</div></div></div>
  </div>
</body>
</html>
