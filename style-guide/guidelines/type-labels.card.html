<!-- @dsCard group="Type" viewport="700x200" name="Labels & Script" subtitle="Uppercase DM Sans eyebrows + Grand Hotel script accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--clr-cream); padding: 24px 28px; color: var(--clr-ink); }
  .eyebrow { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em; color: var(--clr-sage-deep); }
  .eyebrow.teal { color: var(--clr-teal-deep); margin-top: 6px; }
  .script { font-family: var(--font-script); font-size: 46px; color: var(--clr-rose); line-height: 1; margin: 14px 0 0; }
  .spec { margin-top: 14px; font-size: 12px; color: var(--clr-ink-60); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="eyebrow">What's pouring today</div>
  <div class="eyebrow teal">Events · patio · coffee</div>
  <div class="script">Cheers, y'all</div>
  <div class="spec">EYEBROW: DM Sans 700 uppercase, tracking 0.16em, sage/teal · SCRIPT: Grand Hotel (incidental only)</div>
</body>
</html>
