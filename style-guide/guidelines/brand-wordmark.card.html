<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--clr-cream); padding: 0; display: flex; }
  .stage { display: flex; align-items: center; justify-content: center; padding: 26px; }
  .word { flex: 2; }
  .icon { flex: 1; background: var(--clr-ink); }
  .word img { max-height: 150px; max-width: 92%; object-fit: contain; }
  .icon img { max-height: 170px; max-width: 80%; object-fit: contain; }
</style>
</head>
<body>
  <div class="stage word"><img src="../assets/wordmark-color.png" alt="Clara's Day Dive wordmark" /></div>
  <div class="stage icon"><img src="../assets/icon-c-color.png" alt="Clara's C monogram" /></div>
</body>
</html>
