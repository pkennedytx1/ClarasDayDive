<!-- @dsCard group="Type" viewport="700x250" name="Body — DM Sans" subtitle="DM Sans across the UI scale, 17px default" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--clr-cream); padding: 24px 28px; color: var(--clr-ink); }
  p { margin: 0 0 9px; }
  .lead { font-size: 24px; font-weight: 500; line-height: 1.35; max-width: 600px; }
  .body { font-size: 17px; line-height: 1.55; color: var(--clr-ink-80); max-width: 600px; }
  .small { font-size: 15px; color: var(--clr-ink-60); }
  .spec { margin-top: 14px; font-size: 12px; color: var(--clr-ink-60); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <p class="lead">A neighborhood coupe bar on the east side — sun's out, penguins in.</p>
  <p class="body">Default body copy runs at 17px with a 1.55 line-height for easy patio reading. We keep sentences short and warm.</p>
  <p class="small">Secondary / meta text · 15px · ink 60%</p>
  <div class="spec">DM SANS · 500 lead 24 / 400 body 17 / 400 meta 15 · line-height 1.55</div>
</body>
</html>
