<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="8px base rhythm, 4 → 128" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--clr-cream); padding: 24px 28px; color: var(--clr-ink); }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { text-align: center; }
  .bar { background: var(--clr-rose); border-radius: 4px; width: 100%; }
  .lab { font-size: 11px; color: var(--clr-ink-60); margin-top: 6px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="item" style="width:28px"><div class="bar" style="height:8px"></div><div class="lab">2<br/>8</div></div>
    <div class="item" style="width:40px"><div class="bar" style="height:16px"></div><div class="lab">4<br/>16</div></div>
    <div class="item" style="width:52px"><div class="bar" style="height:24px"></div><div class="lab">5<br/>24</div></div>
    <div class="item" style="width:64px"><div class="bar" style="height:32px"></div><div class="lab">6<br/>32</div></div>
    <div class="item" style="width:80px"><div class="bar" style="height:48px"></div><div class="lab">7<br/>48</div></div>
    <div class="item" style="width:96px"><div class="bar" style="height:64px"></div><div class="lab">8<br/>64</div></div>
    <div class="item" style="width:120px"><div class="bar" style="height:96px"></div><div class="lab">9<br/>96</div></div>
  </div>
</body>
</html>
