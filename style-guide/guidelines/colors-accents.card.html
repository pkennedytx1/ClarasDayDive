<!-- @dsCard group="Colors" viewport="700x180" name="Brand Accents" subtitle="Rose primary, teal callout, sage label — the poster trio" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--clr-cream); padding: 22px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .chip { height: 86px; display: flex; align-items: flex-end; padding: 10px; }
  .meta { background: var(--clr-white); padding: 8px 11px; }
  .name { font-size: 13px; font-weight: 600; color: var(--clr-ink); }
  .hex { font-size: 12px; color: var(--clr-ink-60); letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--clr-rose)"></div><div class="meta"><div class="name">Deep Rose · primary</div><div class="hex">#C2556A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--clr-teal)"></div><div class="meta"><div class="name">Teal · callout</div><div class="hex">#2CAAA0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--clr-sage)"></div><div class="meta"><div class="name">Sage · label</div><div class="hex">#7A9B7C</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--clr-rose-deep)"></div><div class="meta"><div class="name">Rose · pressed</div><div class="hex">#A8455A</div></div></div>
  </div>
</body>
</html>
