<!-- @dsCard group="Type" viewport="700x230" name="Display — Playfair" subtitle="Playfair Display italic, the editorial headline voice" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--clr-cream); padding: 26px 28px; color: var(--clr-ink); }
  .big { font-family: var(--font-display); font-style: italic; font-weight: 800; font-size: 64px; line-height: 1.0; letter-spacing: -0.02em; margin: 0; }
  .sub { font-family: var(--font-display); font-weight: 600; font-size: 26px; margin: 14px 0 0; }
  .spec { margin-top: 16px; font-size: 12px; color: var(--clr-ink-60); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <p class="big">Dive in for<br/>a day drink</p>
  <p class="sub">Roman 600 for steady sub-heads</p>
  <div class="spec">PLAYFAIR DISPLAY · italic 800 display / roman 600 · tracking −0.02em · line-height 1.04</div>
</body>
</html>
