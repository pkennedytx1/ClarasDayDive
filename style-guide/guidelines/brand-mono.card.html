<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--clr-cream); padding: 0; display: flex; }
  .stage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 22px; }
  .stage img { max-height: 180px; max-width: 88%; object-fit: contain; }

</style>
</head>
<body>
  <div class="stage"><img src="../assets/logo-combomark-bw.png" alt="Combomark black on cream" /></div>
  <div class="stage dark"><img src="../assets/wordmark-bw.png" alt="Wordmark reversed on ink" style="filter:invert(1)" /></div>
</body>
</html>
